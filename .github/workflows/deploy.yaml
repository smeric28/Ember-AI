name: Deploy Ember AI

on:
  push:
    branches: [main]
    paths:
      - 'k8s/**'
      - 'deploy.ps1'
      - '.github/workflows/deploy.yaml'
  workflow_dispatch:

env:
  NAMESPACE: ember-ai

jobs:
  deploy:
    name: Deploy to K3s
    runs-on: self-hosted   # Must have kubectl access to K3s
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------------------------------------------------
      # Inject secrets from GitHub Secrets into K8s
      # -------------------------------------------------------------------
      - name: Create/Update K8s secrets
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          LITELLM_MASTER_KEY: ${{ secrets.LITELLM_MASTER_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          KEYCLOAK_CLIENT_ID: ${{ secrets.KEYCLOAK_CLIENT_ID }}
          KEYCLOAK_CLIENT_SECRET: ${{ secrets.KEYCLOAK_CLIENT_SECRET }}
          DEEPINFRA_API_KEY: ${{ secrets.DEEPINFRA_API_KEY }}
          ZITI_IDENTITY_JSON: ${{ secrets.ZITI_IDENTITY_JSON }}
        run: |
          # Ensure namespace exists
          kubectl create namespace $NAMESPACE --dry-run=client -o yaml | kubectl apply -f -

          # Create or replace the secret with real values
          kubectl create secret generic ember-ai-env-secrets \
            -n $NAMESPACE \
            --from-literal=POSTGRES_USER="$POSTGRES_USER" \
            --from-literal=POSTGRES_PASSWORD="$POSTGRES_PASSWORD" \
            --from-literal=LITELLM_MASTER_KEY="$LITELLM_MASTER_KEY" \
            --from-literal=DATABASE_URL="$DATABASE_URL" \
            --from-literal=KEYCLOAK_CLIENT_ID="$KEYCLOAK_CLIENT_ID" \
            --from-literal=KEYCLOAK_CLIENT_SECRET="$KEYCLOAK_CLIENT_SECRET" \
            --from-literal=DEEPINFRA_API_KEY="$DEEPINFRA_API_KEY" \
            --from-literal=ZITI_IDENTITY_JSON="$ZITI_IDENTITY_JSON" \
            --dry-run=client -o yaml | kubectl apply -f -

      # -------------------------------------------------------------------
      # Apply manifests in dependency order
      # -------------------------------------------------------------------
      - name: Apply manifests
        run: |
          MANIFESTS=(
            "k8s/01-pgvector.yaml"
            "k8s/02-valkey.yaml"
            "k8s/08-litellm-config.yaml"
            "k8s/03-litellm.yaml"
            "k8s/04-n8n.yaml"
            "k8s/05-openziti.yaml"
          )
          for m in "${MANIFESTS[@]}"; do
            echo "→ Applying $m..."
            kubectl apply -f "$m"
          done

      # -------------------------------------------------------------------
      # Wait for rollouts
      # -------------------------------------------------------------------
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/litellm -n $NAMESPACE --timeout=120s || true
          kubectl rollout status deployment/valkey -n $NAMESPACE --timeout=120s || true
          kubectl rollout status deployment/ziti-edge-tunnel -n $NAMESPACE --timeout=120s || true
          kubectl rollout status statefulset/pgvector -n $NAMESPACE --timeout=120s || true
          kubectl rollout status statefulset/n8n -n $NAMESPACE --timeout=120s || true

      - name: Verify pods
        run: kubectl get pods -n $NAMESPACE -o wide
