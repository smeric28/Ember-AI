apiVersion: v1
kind: Namespace
metadata:
  name: ember-ai

---
# =============================================================================
# Bootstrap secret — placeholder values replaced at deploy time by GitHub
# Actions, which injects real values from GitHub Secrets.
#
# For local dev, create manually:
#   kubectl create secret generic ember-ai-env-secrets -n ember-ai \
#     --from-literal=POSTGRES_USER=ember ...
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: ember-ai-env-secrets
  namespace: ember-ai
type: Opaque
stringData:
  POSTGRES_USER: "REPLACE_AT_DEPLOY"
  POSTGRES_PASSWORD: "REPLACE_AT_DEPLOY"
  LITELLM_MASTER_KEY: "REPLACE_AT_DEPLOY"
  DATABASE_URL: "REPLACE_AT_DEPLOY"
  KEYCLOAK_CLIENT_ID: "REPLACE_AT_DEPLOY"
  KEYCLOAK_CLIENT_SECRET: "REPLACE_AT_DEPLOY"
  DEEPINFRA_API_KEY: "REPLACE_AT_DEPLOY"
  ZITI_IDENTITY_JSON: "REPLACE_AT_DEPLOY"
