# =============================================================================
# LiteLLM Configuration — model routing, fallbacks, and caching
# Mounted as a ConfigMap into the LiteLLM deployment
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: ember-ai
data:
  config.yaml: |
    model_list:
      # -----------------------------------------------------------------------
      # Main engine: Nemotron 3 Super 120B via DeepInfra
      # -----------------------------------------------------------------------
      - model_name: nemotron-120b
        litellm_params:
          model: deepinfra/nvidia/nemotron-3-super-120b-a12b
          api_key: os.environ/DEEPINFRA_API_KEY
          api_base: https://api.deepinfra.com/v1/openai

      # -----------------------------------------------------------------------
      # Router / fast model: Nemotron 3 Nano 4B via DeepInfra
      # Used for intent classification, routing, and lightweight tasks
      # -----------------------------------------------------------------------
      - model_name: nemotron-4b
        litellm_params:
          model: deepinfra/nvidia/nemotron-3-nano-4b
          api_key: os.environ/DEEPINFRA_API_KEY
          api_base: https://api.deepinfra.com/v1/openai

    # -------------------------------------------------------------------------
    # Router Settings
    # -------------------------------------------------------------------------
    router_settings:
      routing_strategy: "simple-shuffle"
      num_retries: 2
      timeout: 120
      fallbacks:
        - nemotron-120b: ["nemotron-4b"]
        - nemotron-4b: ["nemotron-120b"]

    # -------------------------------------------------------------------------
    # Caching — Valkey (Redis-compatible)
    # -------------------------------------------------------------------------
    litellm_settings:
      cache: true
      cache_params:
        type: "redis"
        host: "valkey-svc"
        port: 6379

    # -------------------------------------------------------------------------
    # General Settings
    # -------------------------------------------------------------------------
    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
      database_url: os.environ/DATABASE_URL
