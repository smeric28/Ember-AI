apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: n8n
  namespace: ember-ai
spec:
  serviceName: "n8n-svc"
  replicas: 1
  selector:
    matchLabels:
      app: n8n
  template:
    metadata:
      labels:
        app: n8n
    spec:
      containers:
      - name: n8n
        image: docker.n8n.io/n8nio/n8n:latest
        ports:
        - containerPort: 5678
        env:
        # PostgreSQL Backend
        - name: DB_TYPE
          value: postgresdb
        - name: DB_POSTGRESDB_HOST
          value: pgvector-svc
        - name: DB_POSTGRESDB_PORT
          value: "5432"
        - name: DB_POSTGRESDB_USER
          valueFrom:
            secretKeyRef:
              name: ember-ai-env-secrets
              key: POSTGRES_USER
        - name: DB_POSTGRESDB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ember-ai-env-secrets
              key: POSTGRES_PASSWORD
        - name: DB_POSTGRESDB_DATABASE
          value: ember_ai
        # Redis/Valkey queue
        - name: EXECUTIONS_DATA_SAVE_ON_ERROR
          value: "all"
        - name: EXECUTIONS_DATA_SAVE_ON_SUCCESS
          value: "none"
        - name: QUEUE_BULL_REDIS_HOST
          value: valkey-svc
        - name: QUEUE_BULL_REDIS_PORT
          value: "6379"
        # Webhook routing — OpenZiti service domain
        - name: WEBHOOK_URL
          value: "https://n8n.ember.ziti"
        # Keycloak SSO (OIDC)
        - name: N8N_AUTH_TYPE
          value: "oidc"
        - name: N8N_OIDC_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: ember-ai-env-secrets
              key: KEYCLOAK_CLIENT_ID
        - name: N8N_OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: ember-ai-env-secrets
              key: KEYCLOAK_CLIENT_SECRET
        - name: N8N_OIDC_ISSUER
          value: "https://<KEYCLOAK_HOST>/realms/<REALM>"
        volumeMounts:
        - name: n8n-data
          mountPath: /home/node/.n8n
      # -----------------------------------------------------------------
      # ZeroTier Sidecar — admin interface access
      # -----------------------------------------------------------------
      - name: zerotier
        image: zerotier/zerotier:latest
        securityContext:
          privileged: true
          capabilities:
            add: ["NET_ADMIN", "SYS_ADMIN"]
        env:
        - name: ZEROTIER_ONE_NETWORK_IDS
          valueFrom:
            configMapKeyRef:
              name: zerotier-config
              key: ZEROTIER_NETWORK_ID
        volumeMounts:
        - name: zt-identity
          mountPath: /var/lib/zerotier-one
      volumes:
      - name: zt-identity
        emptyDir: {}
  volumeClaimTemplates:
  - metadata:
      name: n8n-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 10Gi

---
apiVersion: v1
kind: Service
metadata:
  name: n8n-svc
  namespace: ember-ai
spec:
  type: ClusterIP
  ports:
  - port: 5678
    targetPort: 5678
  selector:
    app: n8n
