apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: ember-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      labels:
        app: litellm
    spec:
      containers:
      - name: litellm
        image: ghcr.io/berriai/litellm:main-latest
        args: ["--config", "/app/config.yaml"]
        ports:
        - containerPort: 4000
        env:
        - name: LITELLM_MASTER_KEY
          valueFrom:
            secretKeyRef:
              name: ember-ai-env-secrets
              key: LITELLM_MASTER_KEY
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: ember-ai-env-secrets
              key: DATABASE_URL
        - name: STORE_MODEL_IN_DB
          value: "True"
        - name: REDIS_HOST
          value: "valkey-svc"
        - name: REDIS_PORT
          value: "6379"
        # Keycloak SSO (OIDC)
        - name: GENERIC_AUTHORIZATION_ENDPOINT
          value: "https://auth.embernet.local/realms/ember/protocol/openid-connect/auth"
        - name: GENERIC_TOKEN_ENDPOINT
          value: "https://auth.embernet.local/realms/ember/protocol/openid-connect/token"
        - name: GENERIC_USERINFO_ENDPOINT
          value: "https://auth.embernet.local/realms/ember/protocol/openid-connect/userinfo"
        - name: GENERIC_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: ember-ai-env-secrets
              key: KEYCLOAK_CLIENT_ID
        - name: GENERIC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: ember-ai-env-secrets
              key: KEYCLOAK_CLIENT_SECRET
        # LLM — DeepInfra only
        - name: DEEPINFRA_API_KEY
          valueFrom:
            secretKeyRef:
              name: ember-ai-env-secrets
              key: DEEPINFRA_API_KEY
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        volumeMounts:
        - name: litellm-config
          mountPath: /app/config.yaml
          subPath: config.yaml
          readOnly: true
      # -----------------------------------------------------------------
      # ZeroTier Sidecar — admin interface access
      # -----------------------------------------------------------------
      - name: zerotier
        image: zerotier/zerotier:latest
        securityContext:
          privileged: true
          capabilities:
            add: ["NET_ADMIN", "SYS_ADMIN"]
        env:
        - name: ZEROTIER_ONE_NETWORK_IDS
          valueFrom:
            configMapKeyRef:
              name: zerotier-config
              key: ZEROTIER_NETWORK_ID
        volumeMounts:
        - name: zt-identity
          mountPath: /var/lib/zerotier-one
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
      volumes:
      - name: litellm-config
        configMap:
          name: litellm-config
      - name: zt-identity
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: litellm-svc
  namespace: ember-ai
spec:
  type: ClusterIP
  ports:
  - port: 4000
    targetPort: 4000
  selector:
    app: litellm
